            const catContainer = document.getElementById('categoryFilters');
            catContainer.innerHTML = allCategories.map(cat => `
                <button onclick="handleCategoryChange('${cat}')" class="filter-btn px-3.5 py-2 rounded-xl text-[11px] font-bold ${cat === currentCategory ? 'active' : 'bg-white text-pink-400'}">
                    ${cat}
                </button>
            `).join('');

            const locContainer = document.getElementById('locationFilters');
            locContainer.innerHTML = allLocations.map(loc => `
                <button onclick="handleLocationChange('${loc}')" class="filter-btn px-3.5 py-2 rounded-xl text-[11px] font-bold ${loc === currentLocation ? 'active' : 'bg-white text-pink-400'}">
                    ${loc}
                </button>
            `).join('');
        }

        function handleCategoryChange(cat) { currentCategory = cat; renderFilters(); renderGroups(); }
        function handleLocationChange(loc) { currentLocation = loc; renderFilters(); renderGroups(); }

        function openModal(id) {
            const group = informalData.find(g => g.id === id);
            const modal = document.getElementById('groupModal');
            const modalContent = modal.querySelector('.modal-content');
            const modalBody = document.getElementById('modalBody');

            modalBody.innerHTML = `
                <div class="p-8">
                    <div class="flex justify-between items-start mb-6">
                        <div class="flex items-center gap-4">
                            <div class="w-14 h-14 rounded-2xl bg-pink-50 flex items-center justify-center text-3xl shadow-inner border border-pink-100">
                                ${getEmoji(group.content)}
                            </div>
                            <div>
                                <span class="px-2.5 py-1 rounded-lg text-[10px] font-black uppercase tracking-wider border ${categoryStyles[group.cat1] || 'bg-slate-50 text-slate-500'}">
                                    ${group.cat1}
                                </span>
                                <h2 class="text-2xl font-black text-slate-900 mt-1">${group.name}</h2>
                            </div>
                        </div>
                        <div class="bg-pink-600 text-white px-5 py-2.5 rounded-2xl text-center shadow-lg shadow-pink-100">
                            <p class="text-[10px] font-bold opacity-80 uppercase tracking-widest">Total Members</p>
                            <p class="text-2xl font-black">${group.members}명</p>
                        </div>
                    </div>

                    <div class="space-y-6">
                        <div>
                            <p class="text-[11px] font-black text-pink-400 uppercase tracking-tighter mb-2 flex items-center gap-1.5">
                                <i data-lucide="quote" class="w-3 h-3"></i>
                                Introduction
                            </p>
                            <p class="text-slate-600 leading-relaxed font-medium bg-pink-50/30 p-4 rounded-2xl italic border border-pink-50">
                                "${group.description}"
                            </p>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Main Activity</span>
                                <span class="text-sm font-bold text-slate-700">${group.content}</span>
                            </div>
                            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                                <span class="text-[10px] text-slate-400 font-bold uppercase block mb-1">Business Site</span>
                                <span class="text-sm font-bold text-pink-600 flex items-center gap-1">
                                    <i data-lucide="map-pin" class="w-3.5 h-3.5"></i>
                                    ${group.location}
                                </span>
                            </div>
                        </div>

                        <div class="bg-white border-2 border-pink-50 p-6 rounded-3xl">
                            <div class="flex items-center gap-3 mb-4">
                                <div class="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center">
                                    <i data-lucide="users" class="w-5 h-5 text-pink-600"></i>
                                </div>
                                <div>
                                    <p class="text-[10px] text-pink-300 font-bold uppercase">Executive Board</p>
                                    <p class="text-sm font-black text-slate-800">${group.chairman} (회장) / ${group.secretary} (총무)</p>
                                </div>
                            </div>
                            <div class="pt-4 border-t border-pink-50">
                                <p class="text-[11px] text-pink-300 font-bold uppercase mb-2">Contact Point</p>
                                <div class="flex items-center gap-2">
                                    <span class="text-lg font-black text-slate-700 select-all p-3 bg-pink-50 rounded-2xl border border-pink-100 w-full flex items-center gap-2">
                                        <i data-lucide="mail" class="w-5 h-5 text-pink-500"></i>
                                        이메일 주소: <span class="text-pink-600 font-black">${group.email}</span>
                                    </span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="mt-8 flex gap-3">
                        <button onclick="closeModal()" class="flex-grow py-4 bg-slate-100 text-slate-500 font-bold rounded-2xl hover:bg-slate-200 transition-all">닫기</button>
                        ${group.externalLink ? `
                            <a href="${group.externalLink}" target="_blank" class="flex-[2] py-4 bg-pink-600 text-white font-black rounded-2xl hover:bg-pink-700 transition-all shadow-lg shadow-pink-200 text-center flex items-center justify-center gap-2">
                                공식 소개 페이지 가기
                                <i data-lucide="arrow-up-right" class="w-4 h-4"></i>
                            </a>
                        ` : ''}
                    </div>
                </div>
            `;

            modal.classList.remove('hidden');
            setTimeout(() => {
                modalContent.classList.remove('scale-95', 'opacity-0');
                modalContent.classList.add('scale-100', 'opacity-100');
            }, 10);
            lucide.createIcons();
        }

        function closeModal() {
            const modal = document.getElementById('groupModal');
            const modalContent = modal.querySelector('.modal-content');
            modalContent.classList.add('scale-95', 'opacity-0');
            modalContent.classList.remove('scale-100', 'opacity-100');
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 300);
        }

        function renderGroups() {
            const grid = document.getElementById('groupGrid');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');

            let filtered = informalData.filter(group => {
                const matchesSearch = 
                    group.name.toLowerCase().includes(currentSearch) ||
                    (group.subName && group.subName.toLowerCase().includes(currentSearch)) ||
                    group.content.toLowerCase().includes(currentSearch) ||
                    group.chairman.toLowerCase().includes(currentSearch) ||
                    group.description.toLowerCase().includes(currentSearch) ||
                    group.location.toLowerCase().includes(currentSearch);
                
                const matchesCategory = currentCategory === "전체" || group.cat1 === currentCategory;
                const matchesLocation = currentLocation === "전체" || group.location === currentLocation;
                
                return matchesSearch && matchesCategory && matchesLocation;
            });

            filtered.sort((a, b) => a.name.localeCompare(b.name, 'ko'));
            totalCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');
                
                grid.innerHTML = filtered.map(group => `
                    <div onclick="openModal(${group.id})" class="informal-card bg-white rounded-2xl overflow-hidden flex flex-col h-full border-l-4 border-l-pink-500 p-5 shadow-sm">
                        <div class="flex justify-between items-start mb-3">
                            <div class="w-8 h-8 rounded-full bg-pink-50 flex items-center justify-center text-sm shadow-inner border border-pink-100">
                                ${getEmoji(group.content)}
                            </div>
                            <div class="flex items-center gap-1 text-[10px] font-black text-pink-600 bg-pink-50/50 px-2 py-0.5 rounded-lg">
                                <i data-lucide="map-pin" class="w-3 h-3"></i>
                                ${group.location}
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <span class="text-[9px] font-black uppercase tracking-tighter px-1.5 py-0.5 rounded border ${categoryStyles[group.cat1] || 'bg-slate-50 text-slate-500'}">
                                ${group.cat1}
                            </span>
                            <h3 class="text-lg font-bold text-slate-900 leading-tight mt-1.5 truncate" title="${group.name}">${group.name}</h3>
                        </div>

                        <div class="flex items-center gap-1.5 mt-auto pt-3 border-t border-pink-50/50">
                            <div class="w-2 h-2 bg-pink-400 rounded-full animate-pulse"></div>
                            <span class="text-[11px] font-bold text-slate-600 truncate">${group.content}</span>
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
