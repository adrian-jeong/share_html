<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객가치혁신부문 인포멀 소개</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .category-btn.active {
            background-color: #dc2626; /* red-600 */
            color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-red-600 flex items-center gap-2">
                        <i data-lucide="users" class="w-8 h-8"></i>
                        고객가치혁신부문 인포멀
                    </h1>
                    <p class="text-sm text-gray-500 mt-1">함께 즐기고 성장하는 소통의 장</p>
                </div>
                
                <div class="relative w-full md:w-80">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="인포멀 명칭, 회장, 활동내용 검색..."
                        class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-lg focus:ring-2 focus:ring-red-500 transition-all outline-none"
                    >
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Category Filters -->
        <div id="categoryFilters" class="flex flex-wrap gap-2 mb-8">
            <!-- Categories will be injected here -->
        </div>

        <!-- Stats Summary -->
        <div class="mb-6 flex items-center justify-between">
            <p class="text-sm text-gray-600">
                총 <span id="totalCount" class="font-bold text-red-600">0</span>개의 인포멀이 활성화되어 있습니다.
            </p>
        </div>

        <!-- Grid View -->
        <div id="groupGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-xl border border-dashed border-gray-300">
            <i data-lucide="filter" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
            <h3 class="text-lg font-semibold text-gray-900">검색 결과가 없습니다</h3>
            <p class="text-gray-500">다른 키워드나 카테고리를 선택해 보세요.</p>
            <button 
                onclick="resetFilters()"
                class="mt-4 text-red-600 font-medium hover:underline"
            >
                초기화하기
            </button>
        </div>
    </main>

    <footer class="bg-gray-100 border-t mt-12 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">© 2024 LG Electronics. 고객가치혁신부문 인포멀 정보 공유 시스템</p>
            <div class="mt-4 flex justify-center gap-6">
                <span class="text-xs text-gray-400">본 사이트는 사내 네트워크에서만 접근 가능한 정보를 포함하고 있습니다.</span>
            </div>
        </div>
    </footer>

    <script>
        const informalData = [
            { id: 1, org1: "-", org2: "-", name: "마켓컬리", chairman: "곽정이 주임", email: "junge.kwak@lge.com", secretary: "박수빈 주임", members: 11, content: "맛집탐방", cat1: "문화", cat2: "Staff", date: "25년 4월" },
            { id: 2, org1: "서남부담당", org2: "남부", name: "선넘는사이", chairman: "이원조 기장", email: "wonjo.lee@lge.com", secretary: "박지수 주임", members: 15, content: "탁구", cat1: "스포츠", cat2: "Staff", date: "25년 4월" },
            { id: 3, org1: "수도권중부담당", org2: "중부", name: "안양천 Tracking", chairman: "김훈용 책임", email: "hoonyong.kim@lge.com", secretary: "이익수 책임", members: 13, content: "트래킹", cat1: "레져", cat2: "Staff", date: "23년 3월" },
            { id: 4, org1: "서비스부품관리실", org2: "사무연합", name: "여기어때 풋살", chairman: "김창민 선임", email: "changmin.kim@lge.com", secretary: "심창원 총무", members: 10, content: "풋살", cat1: "스포츠", cat2: "Staff", date: "22년 7월" },
            { id: 5, org1: "Twin", org2: "Twin", name: "꽃요일", chairman: "김예니 책임", email: "yenni.kim@lge.com", secretary: "이유진 선임", members: 40, content: "꽃꽃이", cat1: "기타", cat2: "Staff", date: "23년 3월" },
            { id: 6, org1: "staff", org2: "서비스기술교육팀", name: "발로차", chairman: "김재덕 기장", email: "jaeduk.kim@lge.com", secretary: "강민구 주임", members: 37, content: "족구", cat1: "스포츠", cat2: "Staff", date: "25년 3월" },
            { id: 7, org1: "staff", org2: "마곡 staff", name: "마곡 W6동에서 탁구치는 사람들", chairman: "양정철 책임", email: "", secretary: "김봉진 책임", members: 15, content: "탁구", cat1: "스포츠", cat2: "Staff", date: "22년 6월" },
            { id: 8, org1: "고객가치혁신서비스부품지원실", org2: "HS/ES서비스부품공급팀", name: "어쩌다골프", chairman: "이흥재 책임", email: "branden.lee@lge.com", secretary: "김성욱 사원", members: 19, content: "골프", cat1: "레져", cat2: "Staff", date: "24년 3월" },
            { id: 9, org1: "한국서비스담당", org2: "사무연합", name: "Early Plogger", chairman: "남추자 책임", email: "chucha.nam@lge.com", secretary: "김동은 책임", members: 18, content: "환경", cat1: "기타", cat2: "Staff", date: "23년 3월" },
            { id: 10, org1: "고객가치혁신CC&S역량개발담당", org2: "해외서비스역량강화팀", name: "오버씨스(Overseas)", chairman: "이일영 기정", email: "iylee.ilyoung@lge.com", secretary: "이상범 기장", members: 29, content: "외국어 공부", cat1: "자기계발", cat2: "Staff", date: "24년 1월" },
            { id: 11, org1: "고객가치혁신CC&S부품실", org2: "MS CC&S부품공급팀", name: "CSPGA", chairman: "박창범 기정", email: "changbeom.park@lge.com", secretary: "정봉근 기성", members: 12, content: "골프", cat1: "레져", cat2: "Staff", date: "24년 11월" },
            { id: 12, org1: "강원실", org2: "강원실", name: "길 따라 발 따라", chairman: "문상진 책임", email: "sangjin.moon@lge.com", secretary: "정병모 책임", members: 13, content: "트래킹", cat1: "레져", cat2: "Staff", date: "25년 2월" },
            { id: 13, org1: "중부담당", org2: "중부역량지원게", name: "tracking crew", chairman: "이환택 주임", email: "hwantaek.lee@lge.com", secretary: "이성한 기장", members: 18, content: "트래킹", cat1: "레져", cat2: "Staff", date: "25년 3월" },
            { id: 14, org1: "마곡", org2: "마당놀이", name: "당구", chairman: "이의상 기정", email: "", secretary: "김창수 책임", members: 11, content: "당구", cat1: "레져", cat2: "Staff", date: "25년 5월" },
        ];

        let currentCategory = "전체";
        let currentSearch = "";

        const categoryColors = {
            "스포츠": "bg-blue-100 text-blue-700",
            "레져": "bg-green-100 text-green-700",
            "문화": "bg-purple-100 text-purple-700",
            "자기계발": "bg-orange-100 text-orange-700",
            "기타": "bg-gray-100 text-gray-700",
            "환경": "bg-emerald-100 text-emerald-700"
        };

        function init() {
            renderCategories();
            renderGroups();
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderGroups();
            });

            lucide.createIcons();
        }

        function renderCategories() {
            const categories = ["전체", ...new Set(informalData.map(item => item.cat1))];
            const filterContainer = document.getElementById('categoryFilters');
            
            filterContainer.innerHTML = categories.map(cat => `
                <button
                    onclick="setCategory('${cat}')"
                    class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 ${cat === currentCategory ? 'active' : ''}"
                    id="cat-${cat}"
                >
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderGroups();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            currentSearch = "";
            setCategory("전체");
        }

        function renderGroups() {
            const grid = document.getElementById('groupGrid');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');

            const filtered = informalData.filter(group => {
                const matchesSearch = 
                    group.name.toLowerCase().includes(currentSearch) ||
                    group.content.toLowerCase().includes(currentSearch) ||
                    group.chairman.toLowerCase().includes(currentSearch) ||
                    group.org1.toLowerCase().includes(currentSearch);
                
                const matchesCategory = currentCategory === "전체" || group.cat1 === currentCategory;
                
                return matchesSearch && matchesCategory;
            });

            totalCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');
                
                grid.innerHTML = filtered.map(group => `
                    <div class="bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-xl transition-all duration-300 overflow-hidden group border-t-4 border-t-red-500">
                        <div class="p-6">
                            <div class="flex justify-between items-start mb-4">
                                <span class="px-2 py-1 rounded-full text-xs font-semibold ${categoryColors[group.cat1] || 'bg-gray-100 text-gray-700'}">
                                    ${group.cat1}
                                </span>
                                <div class="flex items-center gap-1 text-xs text-gray-400">
                                    <i data-lucide="calendar" class="w-3 h-3"></i>
                                    ${group.date} 설립
                                </div>
                            </div>

                            <h3 class="text-xl font-bold mb-2 group-hover:text-red-600 transition-colors leading-tight">
                                ${group.name}
                            </h3>
                            
                            <div class="space-y-3 mt-4">
                                <div class="flex items-start gap-3">
                                    <div class="mt-1 bg-red-50 p-1.5 rounded-lg text-red-600">
                                        <i data-lucide="info" class="w-4 h-4"></i>
                                    </div>
                                    <div>
                                        <p class="text-xs text-gray-400">활동 내용</p>
                                        <p class="text-sm font-medium">${group.content}</p>
                                    </div>
                                </div>

                                <div class="flex items-start gap-3">
                                    <div class="mt-1 bg-blue-50 p-1.5 rounded-lg text-blue-600">
                                        <i data-lucide="users" class="w-4 h-4"></i>
                                    </div>
                                    <div>
                                        <p class="text-xs text-gray-400">회장 / 총무</p>
                                        <p class="text-sm font-medium">
                                            ${group.chairman} <span class="text-gray-300 mx-1">|</span> ${group.secretary} (${group.members}명 참여)
                                        </p>
                                    </div>
                                </div>

                                <div class="flex items-start gap-3">
                                    <div class="mt-1 bg-amber-50 p-1.5 rounded-lg text-amber-600">
                                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                                    </div>
                                    <div>
                                        <p class="text-xs text-gray-400">소속 조직</p>
                                        <p class="text-sm text-gray-600 truncate max-w-[200px]">
                                            ${group.org1 !== "-" ? group.org1 : "부문 연합"} / ${group.org2 !== "-" ? group.org2 : "본사"}
                                        </p>
                                    </div>
                                </div>
                            </div>

                            ${group.email ? `
                                <div class="mt-6 pt-4 border-t border-gray-50">
                                    <a 
                                        href="mailto:${group.email}"
                                        class="flex items-center justify-center gap-2 w-full py-2 bg-gray-900 text-white rounded-lg text-sm font-medium hover:bg-red-600 transition-colors"
                                    >
                                        <i data-lucide="mail" class="w-4 h-4"></i>
                                        회장님께 가입 문의하기
                                    </a>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            }
            
            // Re-initialize icons for newly added content
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
