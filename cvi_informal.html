<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>고객가치혁신부문 Staff 인포멀 소개</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .category-btn.active {
            background-color: #dc2626; /* red-600 */
            color: white;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }
    </style>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900">

    <!-- Header -->
    <header class="bg-white border-b sticky top-0 z-10 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                <div>
                    <h1 class="text-2xl font-bold text-red-600 flex items-center gap-2">
                        <i data-lucide="users" class="w-8 h-8"></i>
                        고객가치혁신부문 Staff 인포멀
                    </h1>
                    <p class="text-sm text-gray-500 mt-1">함께 즐기고 성장하는 소통의 장</p>
                </div>
                
                <div class="relative w-full md:w-80">
                    <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                    <input
                        type="text"
                        id="searchInput"
                        placeholder="인포멀 명칭, 회장, 활동내용 검색..."
                        class="w-full pl-10 pr-4 py-2 bg-gray-100 border-none rounded-lg focus:ring-2 focus:ring-red-500 transition-all outline-none"
                    >
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Category Filters -->
        <div id="categoryFilters" class="flex flex-wrap gap-2 mb-8">
            <!-- Categories will be injected here -->
        </div>

        <!-- Stats Summary -->
        <div class="mb-6 flex items-center justify-between">
            <p class="text-sm text-gray-600">
                총 <span id="totalCount" class="font-bold text-red-600">0</span>개의 인포멀이 활성화되어 있습니다.
            </p>
        </div>

        <!-- Grid View -->
        <div id="groupGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Cards will be injected here -->
        </div>

        <!-- Empty State -->
        <div id="emptyState" class="hidden text-center py-20 bg-white rounded-xl border border-dashed border-gray-300">
            <i data-lucide="filter" class="w-12 h-12 text-gray-300 mx-auto mb-4"></i>
            <h3 class="text-lg font-semibold text-gray-900">검색 결과가 없습니다</h3>
            <p class="text-gray-500">다른 키워드나 카테고리를 선택해 보세요.</p>
            <button 
                onclick="resetFilters()"
                class="mt-4 text-red-600 font-medium hover:underline"
            >
                초기화하기
            </button>
        </div>
    </main>

    <footer class="bg-gray-100 border-t mt-12 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-500 text-sm">© 2024 LG Electronics. 고객가치혁신부문 인포멀 정보 공유 시스템</p>
            <div class="mt-4 flex justify-center gap-6">
                <span class="text-xs text-gray-400">본 사이트는 사내 네트워크에서만 접근 가능한 정보를 포함하고 있습니다.</span>
            </div>
        </div>
    </footer>

    <script>
        const informalData = [
            { 
                id: 1, 
                location: "TWIN", 
                name: "꽃요일", 
                chairman: "김예니 책임", 
                email: "yenni.kim@lge.com", 
                secretary: "이유진 선임", 
                members: 40, 
                content: "꽃꽃이", 
                cat1: "기타", 
                cat2: "Staff", 
                date: "23년 3월",
                description: "한 달에 한 번 나만의 꽃다발을 만들며 힐링하는 모임"
            },
            { 
                id: 2, 
                location: "평택", 
                name: "CSPGA", 
                chairman: "정봉근 기성", 
                email: "changbeom.park@lge.com", 
                secretary: "박창범 기정", 
                members: 11, 
                content: "스크린골프", 
                cat1: "레져", 
                cat2: "Staff", 
                date: "24년 11월",
                description: "스크린 스윙 자세 교정과 필드 스킬 공유는 모두 CSPGA에서! 책상에 붙박이로 부족한 운동량 보충 + 스트레스 해결, 매우 나이스~~"
            },
            { 
                id: 3, 
                location: "마곡", 
                name: "마당놀이", 
                chairman: "이의상 기정", 
                email: "293567.lee@lge.com", 
                secretary: "김창수 책임", 
                members: 11, 
                content: "당구", 
                cat1: "레져", 
                cat2: "Staff", 
                date: "25년 5월",
                description: "일과 즐거움을 함께 추구하는 멋진 당구 모임~ 마.당.놀.이"
            },
            { 
                id: 4, 
                location: "마곡", 
                name: "P&P", 
                chairman: "한다혜 사원", 
                email: "dahye.han@lge.com", 
                secretary: "신주영 선임", 
                members: 10, 
                content: "영화", 
                cat1: "레져", 
                cat2: "Staff", 
                date: "26년 3월",
                description: "바쁜 일상 잠시 멈춤(Pause), 영화 속에서 다시 재생(Play)"
            },
            { 
                id: 5, 
                location: "평택", 
                name: "오버씨스(Overseas)", 
                chairman: "이일영 기정", 
                email: "iylee.ilyoung@lge.com", 
                secretary: "이상범 기장", 
                members: 26, 
                content: "외국어 공부", 
                cat1: "자기계발", 
                cat2: "Staff", 
                date: "24년 1월",
                description: "영어 영화 감상, 프리토킹 등 다양한 활동이 가득! 주재원/영어선생님 출신 회원님들의 조언과 함께 'Hey! You can do it!'을 외쳐보아요."
            },
            { 
                id: 6, 
                location: "마곡", 
                name: "꾸꾸꾸", 
                chairman: "최수진 선임", 
                email: "sujin.choi@lge.com", 
                secretary: "송유빈 사원", 
                members: 6, 
                content: "DIY", 
                cat1: "기타", 
                cat2: "Staff", 
                date: "26년 3월",
                description: "바쁜 일상 속 귀여운 힐링시간, 손으로 꼼지락 꼼지락 볼펜부터 크리스마스리스까지 매달 새로운 소품을 꾸미는 힐링 DIY 모임"
            },
            { 
                id: 7, 
                location: "마곡", 
                name: "골때녀", 
                subName: "골프 때리는 녀석들",
                chairman: "정선영 선임", 
                email: "seony.jeong@lge.com", 
                secretary: "이소민 선임", 
                members: 6, 
                content: "스크린골프", 
                cat1: "레져", 
                cat2: "Staff", 
                date: "25년 3월",
                description: "스트레스는 날리고 드라이버는 휘두르는 우리들만의 즐거운 스크린 라운딩.",
                externalLink: "https://adrian-jeong.github.io/share_html/golf_hit.html"
            },
            { 
                id: 8, 
                location: "트윈", 
                name: "영어09", 
                subName: "영어로 말할때 영구같은데 영구면제를 목표한다",
                chairman: "김산 책임", 
                email: "mountain.kim@lge.com", 
                secretary: "김정우 선임", 
                members: 10, 
                content: "영어스피킹", 
                cat1: "자기계발", 
                cat2: "Staff", 
                date: "24년 3월",
                description: "영구면제로 영어고통 벗어나자!"
            }
        ];

        let currentCategory = "전체";
        let currentSearch = "";

        const allCategories = ["전체", "스포츠", "레져", "문화", "자기계발", "기타"];

        const categoryColors = {
            "스포츠": "bg-blue-100 text-blue-700",
            "레져": "bg-green-100 text-green-700",
            "문화": "bg-purple-100 text-purple-700",
            "자기계발": "bg-orange-100 text-orange-700",
            "기타": "bg-gray-100 text-gray-700"
        };

        function init() {
            renderCategories();
            renderGroups();
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                currentSearch = e.target.value.toLowerCase();
                renderGroups();
            });

            lucide.createIcons();
        }

        function renderCategories() {
            const filterContainer = document.getElementById('categoryFilters');
            filterContainer.innerHTML = allCategories.map(cat => `
                <button
                    onclick="setCategory('${cat}')"
                    class="category-btn px-4 py-2 rounded-full text-sm font-medium transition-all bg-white text-gray-600 hover:bg-gray-100 border border-gray-200 ${cat === currentCategory ? 'active' : ''}"
                >
                    ${cat}
                </button>
            `).join('');
        }

        function setCategory(cat) {
            currentCategory = cat;
            renderCategories();
            renderGroups();
        }

        function resetFilters() {
            document.getElementById('searchInput').value = "";
            currentSearch = "";
            setCategory("전체");
        }

        function renderGroups() {
            const grid = document.getElementById('groupGrid');
            const emptyState = document.getElementById('emptyState');
            const totalCount = document.getElementById('totalCount');

            const filtered = informalData.filter(group => {
                const matchesSearch = 
                    group.name.toLowerCase().includes(currentSearch) ||
                    (group.subName && group.subName.toLowerCase().includes(currentSearch)) ||
                    group.content.toLowerCase().includes(currentSearch) ||
                    group.chairman.toLowerCase().includes(currentSearch) ||
                    group.description.toLowerCase().includes(currentSearch) ||
                    group.email.toLowerCase().includes(currentSearch) ||
                    group.location.toLowerCase().includes(currentSearch);
                
                const matchesCategory = currentCategory === "전체" || group.cat1 === currentCategory;
                
                return matchesSearch && matchesCategory;
            });

            totalCount.textContent = filtered.length;

            if (filtered.length === 0) {
                grid.classList.add('hidden');
                emptyState.classList.remove('hidden');
            } else {
                grid.classList.remove('hidden');
                emptyState.classList.add('hidden');
                
                grid.innerHTML = filtered.map(group => `
                    <div class="bg-white rounded-xl border border-gray-100 shadow-sm hover:shadow-md transition-all duration-300 overflow-hidden border-t-4 border-t-red-500 flex flex-col h-full">
                        <div class="p-6 flex-grow">
                            <div class="flex justify-between items-start mb-4">
                                <span class="px-2 py-1 rounded-full text-xs font-semibold ${categoryColors[group.cat1] || 'bg-gray-100 text-gray-700'}">
                                    ${group.cat1}
                                </span>
                                <div class="flex items-center gap-1 text-xs text-gray-400">
                                    <i data-lucide="calendar" class="w-3 h-3"></i>
                                    ${group.date}
                                </div>
                            </div>

                            <div class="flex justify-between items-start gap-2 mb-2">
                                ${group.subName ? `
                                    <div class="flex flex-col">
                                        <h3 class="text-2xl font-black leading-tight text-gray-900">${group.name}</h3>
                                        <p class="text-sm font-medium text-gray-500 mt-0.5">${group.subName}</p>
                                    </div>
                                    ${group.externalLink ? `
                                        <a href="${group.externalLink}" target="_blank" class="flex-shrink-0 text-xs font-bold text-red-600 hover:underline flex items-center gap-1 mt-1">
                                            <i data-lucide="external-link" class="w-3 h-3"></i>
                                            소개 페이지
                                        </a>
                                    ` : ''}
                                ` : `
                                    <h3 class="text-xl font-bold leading-tight text-gray-900">
                                        ${group.name}
                                    </h3>
                                `}
                            </div>
                            
                            <p class="text-sm text-gray-600 mb-6 italic">
                                "${group.description}"
                            </p>

                            <div class="space-y-3 mt-4 text-sm">
                                <div class="flex items-center gap-3 text-gray-600">
                                    <i data-lucide="info" class="w-4 h-4 text-red-400"></i>
                                    <span>${group.content}</span>
                                </div>
                                <div class="flex items-center gap-3 text-gray-600">
                                    <i data-lucide="users" class="w-4 h-4 text-blue-400"></i>
                                    <span>${group.chairman} <span class="text-gray-300 mx-1">|</span> ${group.secretary} (${group.members}명)</span>
                                </div>
                                <div class="flex items-center gap-3 text-gray-600">
                                    <i data-lucide="mail" class="w-4 h-4 text-gray-400"></i>
                                    <span class="break-all font-medium text-red-600 select-all">${group.email}</span>
                                </div>
                                <div class="flex items-center gap-3 text-gray-600">
                                    <i data-lucide="map-pin" class="w-4 h-4 text-amber-400"></i>
                                    <span class="font-medium">${group.location}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }
            
            lucide.createIcons();
        }

        window.onload = init;
    </script>
</body>
</html>
